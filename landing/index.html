<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clean Browser</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap");

      :root {
        --bg: #ececeb;
        --surface: #ffffff;
        --ink: #191a1d;
        --ink-soft: #5b5d64;
        --ink-muted: #8c8e96;
        --line: rgba(20, 22, 28, 0.08);
        --line-strong: rgba(20, 22, 28, 0.13);
        --fill: rgba(20, 22, 28, 0.05);
        --tile: #1c1d21;
        --tile-ink: #ffffff;
        --dot: #22c55e;
        --shadow-sm: 0 1px 2px rgba(16, 18, 24, 0.05), 0 0 0 0.5px rgba(16, 18, 24, 0.03);
        --shadow-card: 0 1px 2px rgba(16, 18, 24, 0.05), 0 14px 34px -20px rgba(16, 18, 24, 0.22);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1b1c1f;
          --surface: #232429;
          --ink: #f2f3f5;
          --ink-soft: rgba(255, 255, 255, 0.62);
          --ink-muted: rgba(255, 255, 255, 0.42);
          --line: rgba(255, 255, 255, 0.09);
          --line-strong: rgba(255, 255, 255, 0.16);
          --fill: rgba(255, 255, 255, 0.07);
          --tile: #f2f3f5;
          --tile-ink: #191a1d;
          --shadow-sm: 0 0 0 0.5px rgba(255, 255, 255, 0.05);
          --shadow-card: 0 0 0 0.5px rgba(255, 255, 255, 0.05);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, ui-sans-serif,
          system-ui, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
        letter-spacing: -0.011em;
        overflow: hidden;
      }

      svg {
        display: block;
      }

      /* very soft, neutral lift behind the stage — no color */
      .veil {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(60% 50% at 50% 30%, rgba(255, 255, 255, 0.55), transparent 70%);
        pointer-events: none;
      }

      @media (prefers-color-scheme: dark) {
        .veil {
          background: radial-gradient(60% 50% at 50% 28%, rgba(255, 255, 255, 0.04), transparent 70%);
        }
      }

      .stage {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 48px 24px;
      }

      /* hint pointing up to the address bar */
      .pointer {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 6px 13px 6px 10px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: var(--shadow-sm);
        font-size: 12.5px;
        font-weight: 500;
        color: var(--ink-soft);
        z-index: 2;
        animation: bob 2.6s ease-in-out infinite;
      }

      .pointer svg {
        width: 13px;
        height: 13px;
        color: var(--ink-muted);
      }

      @keyframes bob {
        0%, 100% { transform: translate(-50%, 0); }
        50% { transform: translate(-50%, -4px); }
      }

      /* black app-icon chip with white glyph (moodboard) */
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
        border-radius: 17px;
        background: var(--tile);
        color: var(--tile-ink);
        box-shadow: 0 14px 32px -18px rgba(20, 22, 30, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .chip svg {
        width: 30px;
        height: 30px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 28px;
        padding: 0 14px;
        margin-top: 24px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: var(--shadow-sm);
        font-size: 12.5px;
        font-weight: 500;
        color: var(--ink-soft);
      }

      .eyebrow .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--dot);
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
      }

      h1 {
        margin: 22px 0 0;
        max-width: 600px;
        font-size: 50px;
        line-height: 1.05;
        font-weight: 680;
        letter-spacing: -0.035em;
      }

      h1 .muted {
        color: var(--ink-muted);
      }

      .sub {
        margin: 18px auto 0;
        max-width: 460px;
        font-size: 16.5px;
        line-height: 1.55;
        color: var(--ink-soft);
        font-weight: 450;
      }

      .quick-label {
        margin: 38px 0 14px;
        font-size: 11.5px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-muted);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        width: 100%;
        max-width: 560px;
      }

      .card {
        display: flex;
        align-items: center;
        gap: 12px;
        text-align: left;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        box-shadow: var(--shadow-sm);
        text-decoration: none;
        color: inherit;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
      }

      .card:hover {
        transform: translateY(-3px);
        border-color: var(--line-strong);
        box-shadow: var(--shadow-card);
      }

      .card .tile {
        flex: none;
        width: 38px;
        height: 38px;
        border-radius: 11px;
        background: var(--tile);
        color: var(--tile-ink);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.03em;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .card .info {
        min-width: 0;
        flex: 1;
      }

      .card .t {
        font-size: 13.5px;
        font-weight: 600;
        letter-spacing: -0.015em;
      }

      .card .s {
        font-size: 11.5px;
        color: var(--ink-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card .go {
        flex: none;
        width: 26px;
        height: 26px;
        border-radius: 8px;
        background: var(--fill);
        color: var(--ink-soft);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 140ms ease, color 140ms ease;
      }

      .card:hover .go {
        background: var(--ink);
        color: var(--surface);
      }

      .card .go svg {
        width: 13px;
        height: 13px;
      }

      @media (max-height: 680px) {
        h1 { font-size: 38px; }
        .quick-label { margin-top: 26px; }
      }

      @media (max-width: 600px) {
        .cards { grid-template-columns: repeat(2, 1fr); }
      }

      @media (max-width: 430px) {
        h1 { font-size: 36px; }
        .cards { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>

      <span class="eyebrow">
        <span class="dot"></span>
        Clean Browser · <span data-version>v0.2.0</span><span data-downloads></span>
      </span>

      <h1><span class="muted">Screenshot the web,</span><br />beautifully framed.</h1>

      <p class="sub">
        Open any site, frame it in a clean macOS browser shell, and capture a
        pixel-perfect shot in one click.
      </p>

      <div class="quick-label">Quick start</div>
      <div class="cards">
        <a class="card" href="https://stripe.com">
          <span class="tile">S</span>
          <span class="info">
            <div class="t">Stripe</div>
            <div class="s">stripe.com</div>
          </span>
          <span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg></span>
        </a>
        <a class="card" href="https://vercel.com">
          <span class="tile">▲</span>
          <span class="info">
            <div class="t">Vercel</div>
            <div class="s">vercel.com</div>
          </span>
          <span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg></span>
        </a>
        <a class="card" href="https://linear.app">
          <span class="tile">L</span>
          <span class="info">
            <div class="t">Linear</div>
            <div class="s">linear.app</div>
          </span>
          <span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg></span>
        </a>
      </div>
    </main>

    <script>
      // Single source of truth for the displayed version + download count: the
      // GitHub Releases API (driven by package.json -> git tag -> release). This
      // keeps the pill in sync automatically so it never goes stale on release.
      (async () => {
        const REPO = "Grkmyldz148/clean-browser";
        const versionEl = document.querySelector("[data-version]");
        const downloadsEl = document.querySelector("[data-downloads]");
        try {
          const res = await fetch("https://api.github.com/repos/" + REPO + "/releases", {
            headers: { Accept: "application/vnd.github+json" }
          });
          if (!res.ok) return;
          const releases = await res.json();
          const published = releases.filter((r) => !r.draft && !r.prerelease);

          // Latest version = newest published release tag.
          if (versionEl && published.length) {
            versionEl.textContent = published[0].tag_name;
          }

          // Total downloads = every .dmg grabbed across all releases (real
          // installs; the .zip is auto-update traffic, the rest is metadata).
          let downloads = 0;
          for (const r of releases) {
            for (const a of r.assets || []) {
              if (a.name.endsWith(".dmg")) downloads += a.download_count || 0;
            }
          }
          if (downloadsEl && downloads > 0) {
            const label =
              downloads >= 1000
                ? (downloads / 1000).toFixed(downloads >= 10000 ? 0 : 1) + "k"
                : String(downloads);
            downloadsEl.textContent = " · " + label + " downloads";
          }
        } catch (_) {
          // Offline / rate-limited — keep the static fallback in the markup.
        }
      })();
    </script>
