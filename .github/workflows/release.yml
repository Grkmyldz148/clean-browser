name: Release

# Push a tag like v0.1.0 to build the macOS DMG and publish a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG (arm64)
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build, sign & notarize
        # Build + sign + notarize on the runner WITHOUT publishing. Publishing is
        # a separate, deterministic step below — electron-builder's own GitHub
        # uploader races release creation when there are several artifacts and
        # silently dropped the dmg/zip/latest-mac.yml, leaving only a blockmap.
        run: npm run electron:build:signed -- --publish never
        env:
          # Code signing: electron-builder imports this .p12 into a temporary
          # keychain and signs with the Developer ID Application identity it
          # contains. CSC_LINK is the base64 of the exported .p12.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization: submitted to Apple via notarytool after signing.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish GitHub Release
        # Upload every artifact atomically with the GitHub CLI: the DMG (manual
        # install) plus the zip + latest-mac.yml + blockmaps that electron-updater
        # reads for in-app auto-update. GITHUB_TOKEN already has contents:write.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "${GITHUB_REF_NAME#v}" \
            --generate-notes \
            release/electron/*.dmg \
            release/electron/*.zip \
            release/electron/*.blockmap \
            release/electron/latest-mac.yml
