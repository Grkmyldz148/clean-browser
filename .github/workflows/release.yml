name: Release

# Push a tag like v0.1.0 to build the macOS DMG and publish a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG (arm64)
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build, sign, notarize & publish
        # `-- --publish always` is appended to the electron:build:signed script
        # so electron-builder uploads the artifacts to the GitHub Release for the
        # pushed tag itself (no separate upload step needed).
        run: npm run electron:build:signed -- --publish always
        env:
          # Lets electron-builder publish to GitHub Releases. GITHUB_TOKEN is
          # provided automatically by Actions and has the contents:write scope
          # granted above — no personal access token required.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing: electron-builder imports this .p12 into a temporary
          # keychain and signs with the Developer ID Application identity it
          # contains. CSC_LINK is the base64 of the exported .p12.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization: submitted to Apple via notarytool after signing.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
