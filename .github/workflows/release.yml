name: Release

# Push a tag like v0.1.0 to build the macOS DMG and publish a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG (arm64)
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build signed + notarized DMG
        run: npm run electron:build:signed
        env:
          # Code signing: electron-builder imports this .p12 into a temporary
          # keychain and signs with the Developer ID Application identity it
          # contains. CSC_LINK is the base64 of the exported .p12.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization: submitted to Apple via notarytool after signing.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/electron/*.dmg
          generate_release_notes: true
